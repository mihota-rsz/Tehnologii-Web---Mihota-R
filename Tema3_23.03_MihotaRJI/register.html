<!DOCTYPE html>
<html lang="ro">

<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Înregistrare</h1>
    <form id="registerForm">
        <label>Username:</label><br>
        <input type="text" id="username"><br><br>

        <label>Email:</label><br>
        <input type="email" id="email"><br><br>

        <label>Parolă:</label><br>
        <input type="password" id="password"><br><br>

        <label>Confirmă parola:</label><br>
        <input type="password" id="confirmPassword"><br><br>

        <button type="submit">Înregistrează-te</button>
    </form>
    <p id="message"></p>
    <p>Ai deja cont? <a href="login.html">Login</a></p>
    <script src="js/storage.js"></script>

    <script>

        document.getElementById("registerForm").onsubmit = function (e) {
            e.preventDefault();

            let username = document.getElementById("username").value.trim();
            let email = document.getElementById("email").value.trim();
            let password = document.getElementById("password").value;
            let confirmPassword = document.getElementById("confirmPassword").value;

            let message = document.getElementById("message");
            if (!username || !email || !password || !confirmPassword) {
                message.innerText = "Toate câmpurile sunt obligatorii!";
                return;
            }

            if (username.length < 3) {
                message.innerText = "Username trebuie să aibă minim 3 caractere!";
                return;
            }

            if (password.length < 6) {
                message.innerText = "Parola trebuie să aibă minim 6 caractere!";
                return;
            }

            if (password !== confirmPassword) {
                message.innerText = "Parolele nu coincid!";
                return;
            }
            let users = StorageManager.getLocal("users") || [];

            let userExists = users.find(u => u.username === username);
            if (userExists) {
                message.innerText = "Username deja există!";
                return;
            }

            let emailExists = users.find(u => u.email === email);
            if (emailExists) {
                message.innerText = "Email deja folosit!";
                return;
            }

            let newUser = {
                id: Date.now(),
                username: username,
                email: email,
                password: password
            };

            users.push(newUser);
            StorageManager.setLocal("users", users);

            message.innerText = "Cont creat cu succes!";

            setTimeout(() => {
                window.location.href = "login.html";
            }, 1500);
        };
    </script>
</body>
</html>
